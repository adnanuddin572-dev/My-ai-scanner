<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Scanner</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; }
        #ad-placeholder { background: #eee; height: 100px; line-height: 100px; margin-bottom: 15px; border-radius: 10px; color: #888; }
    </style>
</head>
<body>

<div class="box">
    <script async="async" data-cfasync="false" src="https://pl29142532.profitablecpmratenetwork.com/0a66b2e5473afe8b50e8e8102be6f3c2/invoke.js"></script>
<div id="container-0a66b2e5473afe8b50e8e8102be6f3c2"></div>


    <h2>AI PDF Scanner 📄</h2>
    <input type="file" id="inp" accept="image/*">
    <button id="btn">Scan & Save PDF</button>
    <p id="msg"></p>
</div>

<script>
    const { jsPDF } = window.jspdf;
    document.getElementById('btn').onclick = async () => {
        const file = document.getElementById('inp').files[0];
        if(!file) return alert("Photo select karein");
        document.getElementById('msg').innerText = "AI Scanning... Thora sabar karein";
        
        Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
            const doc = new jsPDF();
            doc.text(doc.splitTextToSize(text, 180), 10, 10);
            doc.save("document.pdf");
            document.getElementById('msg').innerText = "Done! Download ho gaya.";
        });
    };
</script>

</body>
</html>
